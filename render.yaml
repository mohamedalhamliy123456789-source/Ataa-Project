services:
  - type: web
    name: ataa-backend
    runtime: node
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        sync: false # User should set this in Render dashboard
  - type: static
    name: ataa-frontend
    runtime: static
    buildCommand: cd frontend && npm install && npm run build:web
    staticPublishDir: frontend/dist_web
